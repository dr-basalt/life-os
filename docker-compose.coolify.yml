version: "3.9"

# ── Déploiement via Coolify sur taz-jarvis-hetzner ────────────────────────────
# Proxy : Traefik (réseau externe 'coolify')
# FQDNs :
#   cockpit.infra.ori3com.cloud       → frontend:3000
#   api-cockpit.infra.ori3com.cloud   → sternos-pb:8090

services:
  # ── PocketBase ───────────────────────────────────────────────────────────────
  sternos-pb:
    build: ./pocketbase
    restart: unless-stopped
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-auto}
      LITESTREAM_ACCESS_KEY_ID: ${S3_KEY:-}
      LITESTREAM_SECRET_ACCESS_KEY: ${S3_SECRET:-}
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    volumes:
      - sternos_pb_data:/pb/pb_data
    networks:
      - coolify
      - sternos_internal
    expose:
      - "8090"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sternos-api.rule=Host(`api-cockpit.infra.ori3com.cloud`)"
      - "traefik.http.routers.sternos-api.entrypoints=https"
      - "traefik.http.routers.sternos-api.tls=true"
      - "traefik.http.routers.sternos-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.sternos-api.loadbalancer.server.port=8090"

  # ── SvelteKit Frontend ──────────────────────────────────────────────────────
  sternos-frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_PB_URL: ${PUBLIC_PB_URL:-https://api-cockpit.infra.ori3com.cloud}
    restart: unless-stopped
    environment:
      ORIGIN: ${ORIGIN:-https://cockpit.infra.ori3com.cloud}
      PUBLIC_PB_URL: ${PUBLIC_PB_URL:-https://api-cockpit.infra.ori3com.cloud}
    networks:
      - coolify
      - sternos_internal
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sternos-app-http.rule=Host(`cockpit.infra.ori3com.cloud`)"
      - "traefik.http.routers.sternos-app-http.entrypoints=http"
      - "traefik.http.routers.sternos-app-http.middlewares=redirect-to-https"
      - "traefik.http.routers.sternos-app.rule=Host(`cockpit.infra.ori3com.cloud`)"
      - "traefik.http.routers.sternos-app.entrypoints=https"
      - "traefik.http.routers.sternos-app.tls=true"
      - "traefik.http.routers.sternos-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.sternos-app.loadbalancer.server.port=3000"

volumes:
  sternos_pb_data:
    name: sternos_pb_data

networks:
  coolify:
    external: true
  sternos_internal:
    name: sternos_internal
