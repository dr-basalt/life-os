version: "3.9"

# ── Déploiement via Coolify sur taz-jarvis-hetzner ────────────────────────────
# Proxy : Caddy (réseau externe 'coolify')
# FQDNs :
#   cockpit.infra.ori3com.cloud       → frontend:3000
#   api-cockpit.infra.ori3com.cloud   → lifeos-pb:8090

services:
  # ── PocketBase + Litestream ─────────────────────────────────────────────────
  lifeos-pb:
    build: ./pocketbase
    restart: unless-stopped
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-auto}
      LITESTREAM_ACCESS_KEY_ID: ${S3_KEY:-}
      LITESTREAM_SECRET_ACCESS_KEY: ${S3_SECRET:-}
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    volumes:
      - lifeos_pb_data:/pb/pb_data
    networks:
      - coolify
      - lifeos_internal
    expose:
      - "8090"
    labels:
      - "caddy_1=https://api-cockpit.infra.ori3com.cloud"
      - "caddy_1.handle_path=/*"
      - "caddy_1.handle_path.0_reverse_proxy={{upstreams 8090}}"
      - "caddy_1.header=-Server"
      - "caddy_ingress_network=coolify"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── SvelteKit Frontend ──────────────────────────────────────────────────────
  lifeos-frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_PB_URL: ${PUBLIC_PB_URL:-https://api-cockpit.infra.ori3com.cloud}
    restart: unless-stopped
    environment:
      ORIGIN: ${ORIGIN:-https://cockpit.infra.ori3com.cloud}
      PUBLIC_PB_URL: ${PUBLIC_PB_URL:-https://api-cockpit.infra.ori3com.cloud}
    depends_on:
      lifeos-pb:
        condition: service_started
    networks:
      - coolify
      - lifeos_internal
    expose:
      - "3000"
    labels:
      - "caddy_0=https://cockpit.infra.ori3com.cloud"
      - "caddy_0.encode=zstd gzip"
      - "caddy_0.handle_path=/*"
      - "caddy_0.handle_path.0_reverse_proxy={{upstreams 3000}}"
      - "caddy_0.header=-Server"
      - "caddy_ingress_network=coolify"

volumes:
  lifeos_pb_data:
    name: lifeos_pb_data

networks:
  coolify:
    external: true
  lifeos_internal:
    name: lifeos_internal
