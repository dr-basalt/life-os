# ═══════════════════════════════════════════════════════════════════════════════
# STERN OS — Architecture Cible
# Shape global imposé. Pas négociable.
# Chaque couche a un rôle précis. Pas d'overlap, pas de direct coupling.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Stack actuelle (v0.x) ─────────────────────────────────────────────────────
current:
  frontend:
    tech: "SvelteKit + TailwindCSS"
    url: "https://stern-os.ori3com.cloud"
    role: "Renderer de UI Schemas. Composants invariants uniquement."
    container: sternos-frontend

  backend:
    tech: "PocketBase v0.22 (SQLite + REST + Admin)"
    url: "https://api.stern-os.ori3com.cloud"
    role: "State applicatif — OKRs, tasks, victories, data_gates, onboarding"
    container: sternos-pb
    replication: "Litestream → Hetzner S3"

  agent_runtime:
    tech: "SOMA (Hono.js, LLM-agnostic, OpenAI-compatible)"
    url: "https://soma.stern-os.ori3com.cloud"
    role: "Runtime agentique embarqué. 11 tools. Constitution YAML."
    container: sternos-soma
    llm: "gpt-4o-mini via OpenAI API"

  mcp_server:
    tech: "Hono.js Node.js"
    url: "https://mcp.stern-os.ori3com.cloud"
    role: "14 tools MCP: persona, OKRs, semantic_search, data_gates SCRUD"
    container: sternos-mcp
    version: "1.2.0"

  knowledge_graph:
    tech: "Neo4j 5.x"
    role: "Graphe cognitif — User, Douleurs, Patterns, Désirs, P0, OKRs, Insights"
    connection: "bolt://172.17.0.1:7687"
    seeded: true

  vector_db:
    tech: "Qdrant v1.9.2"
    role: "Embeddings sémantiques — collections: insights, okrs, blueprint"
    connection: "http://sternos-qdrant:6333"
    container: sternos-qdrant

  workflow_engine:
    tech: "Windmill"
    url: "https://flows.stern-os.ori3com.cloud"
    role: "Orchestration flows, cron jobs, sync pipelines"
    container: sternos-windmill

  reverse_proxy:
    tech: "Traefik v3"
    role: "TLS, routing, Let's Encrypt"
    container: sternos-traefik

  infra:
    paas: "Coolify self-hosted — http://128.140.115.220:8000"
    server: "stern-os-brain — 46.224.111.203"
    runtime: "Docker Compose"
    gitops: "GitHub → git pull → make deploy"

# ── Architecture cible (v1.0) — DÉCISION VALIDÉE ─────────────────────────────
# "Directus structure le monde. Neo4j comprend le monde.
#  Qdrant se souvient du monde. Le runtime agentique transforme le monde.
#  Next.js + Payload te le rendent utilisable."
target:

  # ── Experience Plane ──────────────────────────────────────────────────────
  cockpit:
    tech: "Next.js 15 App Router + Payload v3 + Tailwind + shadcn/ui"
    url: "https://app.stern-os.ori3com.cloud"
    role: "Cockpit applicatif SternOS — OKRs, life domains, clone cognitif, execution dashboard"
    pattern: "Server Components + Server Actions + Payload local API"
    features: [auth, RBAC, admin_panel, live_preview, multi_tenancy, forms, mutations]
    container: sternos-next
    note: "Remplace SvelteKit. Payload v3 tourne INSIDE Next.js (même container)."

  # ── Control Plane ─────────────────────────────────────────────────────────
  data_studio:
    tech: "Directus (latest)"
    url: "https://directus.stern-os.ori3com.cloud"
    role: "Meta data/control plane — schema studio, REST/GraphQL auto, permissions, workflows"
    database: Postgres 16
    collections: [objectives, key_results, tasks, victories, data_gates, ui_schemas, agents]
    features: [schema_studio, rest_graphql_auto, flows_automation, permissions_fine_grained, webhooks]
    container: sternos-directus
    note: "Remplace PocketBase. Database-first. API instantanée. Agents écrivent via Directus API."

  shared_db:
    tech: "PostgreSQL 16"
    role: "Source de vérité relationnelle partagée — Directus + Payload sur schemas séparés"
    container: sternos-postgres
    note: "Remplace SQLite de PocketBase. Directus = schema 'directus', Payload = schema 'payload'."

  # ── Knowledge Plane ───────────────────────────────────────────────────────
  cognitive_graph:
    tech: "Neo4j 5.x"
    role: "Graphe cognitif — User, Douleurs, Patterns, Désirs, P0, OKRs, Insights, Concepts"
    note: "Inchangé. Seule source pour les invariants et les relations causales."

  semantic_memory:
    tech: "Qdrant v1.9.2"
    role: "Mémoire sémantique — notes Obsidian, OKRs embeddings, RAG"
    collections: [insights, okrs, blueprint]
    note: "Inchangé."

  # ── Execution Plane ───────────────────────────────────────────────────────
  agent_runtime:
    tech: "SOMA (Hono.js) — évolue vers LangGraph en v1.x"
    role: "Discovery, reasoning, génération, orchestration"
    note: "SOMA v0.x reste. LangGraph + LiteLLM en v1.x."

  mcp_server:
    tech: "Hono.js Node.js"
    role: "19 tools MCP — v1.3.0 maintenant, v1.4.0 avec adapter Directus"
    migration: "Appels PocketBase → remplacés par Directus SDK en v1.4.0"

  # ── Sites SEO/vitrine (hors SternOS core) ─────────────────────────────────
  sites_seo:
    tech: "Astro + Tailwind"
    role: "Sites publics, landing pages, blogs, documentation, contenu marketing O3C"
    note: "PAS le shell de SternOS. Uniquement sites vitrine de l'écosystème."

# ── Couches système ───────────────────────────────────────────────────────────
planes:
  data_plane:
    description: "Sources déclarées, connectors, parsers, classifiers"
    components: [data_gate_registry, obsidian_sync, git_connectors, api_connectors]

  meta_ir_plane:
    description: "Discovery → entities / relations / events / intents / axioms / OKR"
    components: [soma_discovery, entity_extraction, meta_ir_builder]

  knowledge_plane:
    description: "Neo4j (invariants) + Qdrant (sémantique) + Postgres (relationnel)"
    components: [neo4j_persona, qdrant_vectors, postgres_state]

  control_plane:
    description: "Directus — schema studio, collections, permissions, REST/GraphQL, flows"
    components: [directus_schema, directus_api, directus_flows, directus_permissions]

  execution_plane:
    description: "SOMA + MCP + Windmill — discovery, reasoning, orchestration"
    components: [soma_runtime, mcp_server_v1, windmill_flows]

  experience_plane:
    description: "Next.js + Payload — cockpit OKR, dashboards, mutations, live preview"
    components: [nextjs_app_router, payload_collections, shadcn_widgets, ui_schema_registry]

