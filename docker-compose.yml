version: "3.9"

services:
  # ─── PocketBase + Litestream ────────────────────────────────────────────────
  pocketbase:
    build: ./pocketbase
    container_name: sternos-pb
    restart: unless-stopped
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-auto}
      LITESTREAM_ACCESS_KEY_ID: ${S3_KEY}
      LITESTREAM_SECRET_ACCESS_KEY: ${S3_SECRET}
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    volumes:
      - pb_data:/pb/pb_data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pb.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.pb.entrypoints=websecure"
      - "traefik.http.routers.pb.tls.certresolver=letsencrypt"
      - "traefik.http.services.pb.loadbalancer.server.port=8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── SvelteKit Frontend ─────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: sternos-frontend
    restart: unless-stopped
    environment:
      PUBLIC_PB_URL: https://api.${DOMAIN}
      ORIGIN: https://${DOMAIN}
      SOMA_INTERNAL_URL: http://sternos-soma:3002
      SOMA_ADMIN_TOKEN: ${SOMA_ADMIN_TOKEN:-SternOSAdmin2026}
      MCP_INTERNAL_URL: http://sternos-mcp:3001
    depends_on:
      pocketbase:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # ─── Windmill (Agent Orchestration) ────────────────────────────────────────
  windmill:
    image: ghcr.io/windmill-labs/windmill:main
    container_name: sternos-windmill
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://windmill:${WM_DB_PASS}@windmill_db/windmill
      BASE_URL: https://flows.${DOMAIN}
      NUM_WORKERS: 2
    depends_on:
      windmill_db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.windmill.rule=Host(`flows.${DOMAIN}`)"
      - "traefik.http.routers.windmill.entrypoints=websecure"
      - "traefik.http.routers.windmill.tls.certresolver=letsencrypt"
      - "traefik.http.services.windmill.loadbalancer.server.port=8000"

  windmill_db:
    image: postgres:16-alpine
    container_name: sternos-windmill-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: windmill
      POSTGRES_USER: windmill
      POSTGRES_PASSWORD: ${WM_DB_PASS}
    volumes:
      - wm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U windmill"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Traefik ────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3
    container_name: sternos-traefik
    restart: unless-stopped
    command:
      - "--log.level=INFO"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme_data:/acme

  # ─── MCP Server (AI Agent connector) ────────────────────────────────────────
  mcp:
    build: ./mcp-server
    container_name: sternos-mcp
    restart: unless-stopped
    environment:
      NEO4J_URI: bolt://${NEO4J_HOST:-172.19.0.2}:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-SternOS2026xNeo4j}
      PB_URL: http://sternos-pb:8090
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
      QDRANT_URL: http://sternos-qdrant:6333
      OPENAI_API_KEY: ${LLM_API_KEY:-}
      DIRECTUS_URL: http://sternos-directus:8055
      DIRECTUS_ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@ori3com.cloud}
      DIRECTUS_ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-}
      USE_DIRECTUS: ${USE_DIRECTUS:-false}
    depends_on:
      pocketbase:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp.rule=Host(`mcp.${DOMAIN}`)"
      - "traefik.http.routers.mcp.entrypoints=websecure"
      - "traefik.http.routers.mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.mcp.loadbalancer.server.port=3001"

  # ─── SOMA — Agent Runtime (LLM-agnostic, constitution embarquée) ────────────
  soma:
    build: ./agent-runtime
    container_name: sternos-soma
    restart: unless-stopped
    environment:
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-qwen/qwen-2.5-coder-32b-instruct}
      SOMA_ADMIN_TOKEN: ${SOMA_ADMIN_TOKEN:-SternOSAdmin2026}
      PROJECT_PATH: /opt/stern-os
      NEO4J_URI: bolt://${NEO4J_HOST:-172.17.0.1}:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-SternOS2026xNeo4j}
      PB_URL: http://sternos-pb:8090
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
      QDRANT_URL: http://sternos-qdrant:6333
      OPENAI_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - /opt/stern-os:/opt/stern-os   # accès au codebase en live
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      pocketbase:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.soma.rule=Host(`soma.${DOMAIN}`)"
      - "traefik.http.routers.soma.entrypoints=websecure"
      - "traefik.http.routers.soma.tls.certresolver=letsencrypt"
      - "traefik.http.services.soma.loadbalancer.server.port=3002"

  # ─── Qdrant — Vector DB (RAG + semantic search) ──────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: sternos-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      default:
        aliases:
          - sternos-qdrant

  # ─── PostgreSQL — base relationnelle partagée Directus + Payload ─────────
  postgres:
    image: postgres:16-alpine
    container_name: sternos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sternos}
      POSTGRES_USER: ${POSTGRES_USER:-sternos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sternos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Directus — control plane data/schema studio ─────────────────────────
  directus:
    image: directus/directus:latest
    container_name: sternos-directus
    restart: unless-stopped
    environment:
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@ori3com.cloud}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      DB_CLIENT: pg
      DB_HOST: sternos-postgres
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-sternos}
      DB_USER: ${POSTGRES_USER:-sternos}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: directus
      WEBSOCKETS_ENABLED: "true"
      PUBLIC_URL: https://directus.${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.directus.rule=Host(`directus.${DOMAIN}`)"
      - "traefik.http.routers.directus.entrypoints=websecure"
      - "traefik.http.routers.directus.tls.certresolver=letsencrypt"
      - "traefik.http.services.directus.loadbalancer.server.port=8055"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8055/server/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Next.js + Payload — cockpit applicatif SternOS ──────────────────────
  sternos-next:
    build: ./app
    container_name: sternos-next
    restart: unless-stopped
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-sternos}:${POSTGRES_PASSWORD}@sternos-postgres:5432/${POSTGRES_DB:-sternos}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-sternos-payload-secret-change-in-prod}
      DIRECTUS_URL: http://sternos-directus:8055
      DIRECTUS_ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@ori3com.cloud}
      DIRECTUS_ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-}
      NEO4J_URI: bolt://${NEO4J_HOST:-172.19.0.2}:7687
      NEO4J_HTTP_URL: http://${NEO4J_HOST:-172.19.0.2}:7474
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-SternOS2026xNeo4j}
      QDRANT_URL: http://sternos-qdrant:6333
      MCP_URL: http://sternos-mcp:3001
      NEXT_PUBLIC_MCP_URL: https://mcp.${DOMAIN}
      NEXT_PUBLIC_APP_URL: https://app.${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      directus:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.next.rule=Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.next.entrypoints=websecure"
      - "traefik.http.routers.next.tls.certresolver=letsencrypt"
      - "traefik.http.services.next.loadbalancer.server.port=3000"

volumes:
  pb_data:
  wm_pg_data:
  acme_data:
  qdrant_data:
  postgres_data:
